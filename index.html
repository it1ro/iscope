<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Снайперский шутер — баллистика и видимая пуля</title>

<body>
    <div class="scope">
        <div class="scope-dot"></div>
    </div>

        🖱️ МЫШЬ — прицеливание | 🔫 ЛКМ — выстрел (пуля летит с баллистикой)
    </div>
